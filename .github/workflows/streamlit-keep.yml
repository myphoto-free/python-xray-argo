name: Streamlit 自动唤醒

on:
  workflow_dispatch:
  repository_dispatch:
    types: [service-down-alert]
  schedule:
    - cron: '*/40 * * * *'     # 每40分钟运行一次（推荐）

jobs:
  wakeup:
    runs-on: ubuntu-latest

    steps:
      - name: 检查触发事件
        run: |
          echo "Workflow triggered by: ${{ github.event_name }}"

      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Chrome + Chromedriver（推荐）
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装系统依赖（适配 Ubuntu 24.04）
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdbus-1-3 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxext6 libxfixes3 libxrandr2 libgbm1 \
            libasound2t64 libatspi2.0-0 libxshmfence1 libglib2.0-0t64

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r keep/requirements.txt

      - name: 执行 Streamlit 唤醒脚本
        env:
          STREAMLIT_APP_URL: ${{ vars.STREAMLIT_APP_URL }}
        run: |
          echo "STREAMLIT_APP_URL = ${STREAMLIT_APP_URL}"
          if [ -z "${STREAMLIT_APP_URL}" ]; then
            echo "❌ STREAMLIT_APP_URL 环境变量为空！请在 Repository Settings → Variables 中设置"
            exit 1
          fi
          python keep/streamlit-keep.py
