name: Streamlit 自动唤醒

on:
  workflow_dispatch:
  repository_dispatch:
    types: [service-down-alert]
  schedule:
    - cron: '*/40 * * * *'   # 每 40 分钟运行一次（推荐范围：30~50 分钟）

jobs:
  wakeup:
    runs-on: ubuntu-latest

    steps:
      - name: 检查触发事件
        run: |
          echo "Workflow triggered by: ${{ github.event_name }}"
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "触发事件类型: ${{ github.event.action }} → 来自监控工具的下线警报"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "工作流被手动触发"
          else
            echo "定时任务触发"
          fi

      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Chrome 浏览器（推荐方式）
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable          # 或 "latest"
          install-chromedriver: true      # 自动安装匹配版本的 chromedriver

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"          # 建议升级到 3.11 或 3.12

      - name: 安装系统依赖（提升 Selenium 稳定性）
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdbus-1-3 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxext6 libxfixes3 libxrandr2 libgbm1 libasound2

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r keep/requirements.txt

      - name: 执行 Streamlit 唤醒脚本
        env:
          STREAMLIT_APP_URL: ${{ vars.STREAMLIT_APP_URL }}
          # 可选：增加日志级别
          # LOG_LEVEL: DEBUG
        run: |
          python keep/streamlit-keep.py
